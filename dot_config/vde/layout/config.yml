presets:
  web-dev:
    name: Web Development
    description: Editor, server, and logs
    layout:
      type: horizontal
      ratio: ["90c", 2]
      panes:
        - name: editor
          command: nvim
          focus: true
        - type: vertical
          ratio: [2, 1]
          panes:
            - name: server
              command: npm run dev
              cwd: ~/projects/app
              env:
                NODE_ENV: development
            - name: logs
              command: tail -f logs/app.log
              title: Logs
              delay: 500
  monitor:
    name: Monitor
    command: htop
