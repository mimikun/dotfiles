name: Run Stylua

on:
  push:
    branches:
      - master
    paths:
      - "**.lua"
  pull_request:
    paths:
      - "**.lua"

permissions: {}

jobs:
  lint:
    name: Run Stylua
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run Stylua
        uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: we recommend pinning to a specific version in case of formatting changes
          version: latest
          # CLI arguments
          args: --check .
